name: The Case of the Stolen River Heart
img: >-
  modules/disc-coveries/assets/the_case_of_the_stolen_river_heart/Grand%20Market%20scene.webp
caption: A 'Discworld, Adventures in Ankh-Morpork' adventure by CalinStar
sort: 1
description: >-
  <p><span style="font-family:Signika, sans-serif">The <strong
  style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
  var(--color-scrollbar-track)">Heart of the Ankh</strong> (an artefact tied to
  the mysterious ebb and flow of the river) has gone missing from the <strong
  style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
  var(--color-scrollbar-track)">Temple of the Ankh</strong>. With guild
  rivalries already teetering on the edge of war, <strong
  style="box-sizing:border-box;user-select:text;scrollbar-width:thin;scrollbar-color:var(--color-scrollbar)
  var(--color-scrollbar-track)">Lord Vetinari</strong> quietly assembles a group
  of "independent specialists" to handle the matter discreetly... by which he
  means without paperwork and plausible deniability.</span></p>
