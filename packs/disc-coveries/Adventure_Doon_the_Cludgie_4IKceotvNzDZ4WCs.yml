name: Doon the Cludgie
img: modules/disc-coveries/assets/doon_the_cludgie/banner.png
caption: A ‘Discworld, Adventures in Ankh-Morpork’ adventure by Chris Franklin
sort: 0
description: >-
  <p><strong>Adventure Overview:</strong></p><p><span
  style="font-family:'Aptos',sans-serif">The adventure begins at the magical
  refuse heap near the Unseen University, where Tiffany Aching has just paid a
  visit to Eskarina Smith. As she leaves, Tiffany realizes she’s lost her prized
  silver horse pendant, a key component of her shambles. Panicked and
  determined, she enlists the help of a gang of Feegles—little blue, fight-happy
  Pictsies with a penchant for mischief and treasure—to retrieve the pendant.
  This is no ordinary search, though; the Feegles must brave the university's
  pipes, sewers, and a series of weird, wonderful, and downright dangerous
  obstacles to recover Tiffany's precious pendant.</span></p><p><strong>Key
  Adventure Elements:</strong></p><ul style="margin-top:0cm"><li
  class="MsoNormal" style="text-align:justify;mso-list:l0 level1
  lfo1;tab-stops:list 36.0pt"><p><strong>Location:</strong> University refuse
  dump, sewer tunnels under the University, and various hidden chambers of
  discarded wizard items.</p></li><li><p><span
  style="font-family:'Aptos',sans-serif"><strong>Time Setting:</strong> The era
  of <em>The Shepherd’s Crown</em>, with Tiffany Aching recently visiting
  Eskarina Smith.</span></p></li></ul>
