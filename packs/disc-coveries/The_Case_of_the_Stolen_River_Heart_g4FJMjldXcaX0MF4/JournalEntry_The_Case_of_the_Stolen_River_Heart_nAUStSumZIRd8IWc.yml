  - sort: 400000
    name: 'Scene 3: The Alchemists’ Guild'
    type: text
    _id: dAmnPdXlD8FhQRaX
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Discover more about the Heart of
        the Ankh's potential uses, learn about rogue elements within the guild,
        and gather leads on smuggling operations tied to the artefact's
        movement.</p><hr /><h4><strong>Location:</strong></h4><p>The
        <strong>Alchemists’ Guild District</strong> – A chaotic area filled with
        half-destroyed buildings that look like they've been rebuilt multiple
        times (poorly). Smoke rises from several chimneys, occasionally
        accompanied by random bursts of fire or flying debris. The guild’s
        headquarters itself is a patchwork of different architectural styles,
        reflecting various failed experiments in structural integrity.</p><hr
        /><h4><strong>Key NPCs:</strong></h4><ol><li><strong>Trixie
        Steelforge</strong> – A highly competent alchemist, head of safety
        compliance. She’s calm under pressure but frequently exasperated by her
        colleagues’ reckless behaviour.</li><li><strong>Master Helix
        Fumble</strong> (optional) – The rogue alchemist secretly responsible
        for stealing the artefact. He might be hiding in the guild or have left
        behind cryptic clues regarding his
        intentions.</li><li><strong>Alchemical Apprentices</strong> – Panicked,
        soot-covered apprentices trying (and failing) to control various runaway
        experiments.</li></ol><hr /><h4><strong>Description:</strong></h4><p>The
        players arrive to find the district in typical disarray. Apprentices are
        running in all directions, some on fire (but only <em>mildly</em>). A
        recent explosion has destabilised parts of the guild building, and
        several alchemists are arguing over whose experiment caused the
        incident. Sparks of magical energy float in the air, causing random side
        effects like glowing eyes or uncontrollable hiccups. Despite the chaos,
        Trixie Steelforge greets the party with surprising calmness.</p><hr
        /><h4><strong>Side
        Elements:</strong></h4><ul><li><p><strong>Uncontrolled
        Experiments:</strong></p><ul><li>One alchemist’s failed potion causes
        nearby objects (including people) to float in place.</li><li>A failed
        "stabilising powder" temporarily turns the players’ hair bright
        green.</li><li>An apprentice offers samples of <em>“exploding
        cheese,”</em> insisting it’s a breakthrough culinary
        invention.</li></ul></li><li><p><strong>Alchemical
        Overconfidence:</strong></p><ul><li>Trixie (deadpan): <em>“Oh yes,
        perfectly safe! Well, as long as you avoid the, um… side
        effects.”</em></li><li>Another alchemist yells from a collapsing
        balcony: <em>“This is perfectly normal! The fire’s only mildly
        magical!”</em></li></ul></li></ul><hr /><h4><strong>Investigation
        Opportunities:</strong></h4><p>The players can search for clues,
        question alchemists, or examine guild records to uncover more about the
        Heart of the Ankh.</p><ol><li><p><strong>Clues Left by Helix
        Fumble:</strong></p><ul><li>Hidden notes in the lab suggest that Master
        Fumble planned to use the Heart as a stabilising element for volatile
        alchemical reactions.</li><li>A perception check reveals traces of the
        same alchemical residue found at the Temple of Small Gods, linking the
        incidents.</li></ul></li><li><p><strong>Guild
        Rivalries:</strong></p><ul><li>Players overhear alchemists blaming rival
        guilds, particularly the Thieves’ Guild, for sabotaging their
        experiments.</li><li>An alchemist mentions that rogue elements within
        the guild may have hired smugglers to transport "volatile materials" to
        the Drowned Quarter.</li></ul></li><li><p><strong>Evidence of
        Smuggling:</strong></p><ul><li>Players find transport records indicating
        a shipment of "classified reagents" recently sent to a hidden warehouse
        near the canals.</li><li>A successful charisma or investigation check
        reveals that one apprentice overheard a meeting between Master Fumble
        and a smuggler.</li></ul></li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p><strong>Trixie Steelforge:</strong><br
        /><em>“Ah, yes, more unwilling participants. You’ll fit right
        in.”</em></p></li><li><p><strong>Panicked Apprentice:</strong><br
        /><em>“Look, it's only technically exploding! It's still a
        success!”</em></p></li><li><p><strong>Alchemist:</strong><br /><em>“You
        wouldn’t happen to be immune to, uh, instant combustion, would you? No
        reason—just curious.”</em></p></li></ul><hr /><h4><strong>How the Scene
        Ends:</strong></h4><p>The players uncover leads pointing to smuggling
        operations in the <strong>Drowned Quarter</strong>. They may also
        receive information suggesting the involvement of rogue guild members or
        hints that rival guilds (such as the Thieves' Guild) have their own
        interest in the artefact. The players can now choose whether to pursue
        the smugglers or confront the Thieves' Guild for more answers.</p><hr
        /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Experiment Gone
        Wrong:</strong></p><ul><li>The players accidentally trigger a runaway
        experiment, causing significant property damage. They are blamed for the
        incident and fined by the guild. Future interactions with the guild may
        become hostile or bureaucratic
        nightmares.</li></ul></li><li><p><strong>False
        Leads:</strong></p><ul><li>The players are misled into thinking another
        faction is responsible, wasting time and resources investigating
        irrelevant clues.</li></ul></li><li><p><strong>Humorous
        Consequences:</strong></p><ul><li>One player develops a random magical
        effect (e.g., glowing skin, uncontrollable hiccups, or floating 6 inches
        off the ground).</li><li>An apprentice follows the party, begging them
        to help test his latest <em>“perfectly safe”</em>
        invention.</li></ul></li></ol>
