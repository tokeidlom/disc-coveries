  - sort: 900000
    name: 'Side Event 1: The Mysterious Floating Order Form'
    type: text
    _id: rtzQ2IoDX3vDG1dx
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Location:</strong> Anywhere in the Guild
        District</p><p><strong>Trigger:</strong> The players find a paper form
        fluttering in the wind. Strangely, it seems drawn to
        them.</p><h4><strong>Description:</strong></h4><p>The form is a
        <strong>Permit Request for Intrusion</strong>, apparently "issued" to
        the adventurers without their knowledge. Bureaucratic in design, it
        includes bizarre terms such as <em>“Interim permission to trespass in
        sensitive areas for officially unofficial reasons.”</em> No one knows
        where it came from, but several guild officials eye it nervously, as if
        the form itself has power.</p><h4><strong>Potential
        Outcomes:</strong></h4><ul><li><strong>Filling out the form</strong>
        causes more forms to appear, demanding extra signatures, witness
        approvals, and even tax filings.</li><li><strong>An NPC from the Bureau
        of Forms</strong> eventually arrives, claiming the form was part of a
        lost internal experiment in <em>spontaneous administrative
        recursion.</em></li><li><strong>Completing the form</strong> somehow
        grants the party <strong>temporary immunity to guild
        infractions</strong>, though no one can explain why it
        works.</li></ul><h4><strong>Elements:</strong></h4><ul><li>Bureaucrats
        panic, muttering, <em>“It’s a recursive form—it never
        ends!”</em></li><li>The form resists being destroyed, reappearing in a
        player’s pocket moments later.</li><li>A passing clerk sighs and
        mutters, <em>"Oh no, not another one..."</em> before sprinting
        away.</li></ul>
