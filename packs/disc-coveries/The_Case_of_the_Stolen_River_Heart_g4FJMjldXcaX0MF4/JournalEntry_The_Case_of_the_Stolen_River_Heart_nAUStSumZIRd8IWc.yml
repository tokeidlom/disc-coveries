  - sort: 1100000
    name: 'Side Event 3: Mrs. Cake’s Premonition Service'
    type: text
    _id: xbswQMuEgqjCX514
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Location:</strong> The Temple
        District</p><p><strong>Trigger:</strong> Mrs. Cake intercepts the
        players as they walk through the
        district.</p><h4><strong>Description:</strong></h4><p>Mrs. Cake claims
        to have <em>foreseen</em> the players’ involvement in the theft
        investigation and insists on sharing her visions—for a <em>"small but
        mandatory fee."</em> Her premonitions are eerily accurate but phrased in
        ways that could mean almost anything. She speaks in a way that suggests
        she’s already heard the players’ responses before they say
        them.</p><h4><strong>Potential Outcomes:</strong></h4><ul><li>The
        players try to interpret a cryptic prophecy like, <em>“Beware the third
        duck.”</em></li><li>Mrs. Cake unexpectedly provides <strong>useful
        warnings</strong>, hinting at specific <strong>traps, betrayals, or key
        locations</strong>.</li><li>A misunderstanding of her prophecy leads to
        comedic paranoia—<em>“No, no, that’s only the second duck! We’re still
        safe!”</em></li></ul><h4><strong>Elements:</strong></h4><ul><li><p>She
        repeatedly <strong>answers questions before they’re
        asked</strong>:</p><ul><li><em>“Yes, I know. No, you’re wrong. I don’t
        do refunds.”</em></li></ul></li><li>Prophecy confusion leads to
        slapstick scenarios, such as the party getting overly suspicious of
        innocent ducks.</li><li>If the players don’t pay, she sighs and mutters,
        <em>“Oh well, your loss. Quite literally.”</em> before walking off
        ominously.</li></ul>
