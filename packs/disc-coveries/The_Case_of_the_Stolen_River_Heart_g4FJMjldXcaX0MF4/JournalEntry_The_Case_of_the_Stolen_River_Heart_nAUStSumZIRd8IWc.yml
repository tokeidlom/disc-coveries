  - sort: 300000
    name: 'Scene 2: The Temple of Small Gods'
    type: text
    _id: qxaIclrKmos54DPl
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Gather information about the
        theft while encountering the absurdity of Ankh-Morpork's religious
        diversity. Introduce conflicting accounts and suspicions while hinting
        at greater political intrigues.</p><hr
        /><h4><strong>Location:</strong></h4><p>The <strong>Temple of Small
        Gods</strong> – a vast, crumbling temple complex filled with shrines to
        countless deities, ranging from major gods to hilariously minor ones
        like the <strong>God of Unexpected Loud Noises</strong>. Elaborate
        channels of sacred water flow between the altars, though parts of the
        system appear suspiciously dry. Statues and religious relics are crammed
        into every corner, creating a chaotic atmosphere of reverence and
        bureaucracy.</p><hr /><h4><strong>Key
        NPCs:</strong></h4><ol><li><strong>Brother Frank </strong>– A weary but
        determined priest struggling to maintain order among competing religious
        sects. He’s practical but constantly exasperated by the temple’s
        internal politics.</li><li><strong>High Priest Noodin
        (optional)</strong> – An eccentric priest who insists the theft is a
        sign of divine retribution. He frequently misattributes phenomena to
        minor gods with bizarre portfolios.</li><li><strong>Mrs. Cake (Side
        Encounter)</strong> – A psychic medium who claims to have "foreseen" the
        players' visit. She offers cryptic prophecies and unsettlingly accurate
        warnings.</li></ol><hr /><h4><strong>Description:</strong></h4><p>As the
        players enter, they see priests and acolytes in heated debates. Some
        argue that the theft was divine punishment for recent lapses in worship
        (specifically for gods no one remembers anymore), while others blame it
        on city politics. Sacred water channels occasionally bubble or reverse
        direction, causing further panic. Several priests claim to have seen
        ghostly figures near the canals, though their descriptions vary
        wildly.</p><hr /><h4><strong>Side
        Elements:</strong></h4><ul><li><strong>Ritual Mix-ups:</strong> An
        acolyte mistakenly combines a ritual of purification with a recipe for
        ceremonial bread, accidentally summoning the <strong>Loaf God</strong>
        (<em>“Blessed be thy crust!”</em>).</li><li><p><strong>Contradictory
        Theories:</strong></p><ul><li>High Priest Noodin insists: <em>“The River
        God’s wrath is like… damp chaos! It’s poetic if you think about
        it.”</em></li><li>Another priest argues it was the <strong>Divine
        Duck</strong>, who "delights in water
        mischief."</li></ul></li><li><strong>Missing Manual:</strong> A
        flustered junior priest tells the party that the <strong>Manual of
        Prophecies</strong> has been misplaced. Without it, no one knows which
        prophecy might be relevant.</li></ul><hr /><h4><strong>Investigation
        Opportunities:</strong></h4><p>Players can investigate clues in and
        around the temple, using perception, investigation, or charm to piece
        together the truth.</p><ol><li><p><strong>Disrupted Water
        Channels:</strong></p><ul><li>Rolls reveal evidence of tampering with
        the temple’s sacred water system, possibly to obscure the theft’s
        timing.</li><li>Players may find strange alchemical residue near the
        disrupted sections.</li></ul></li><li><p><strong>Ghostly Figure
        Reports:</strong></p><ul><li>Several priests describe seeing ghostly
        figures in the canals. Further questioning reveals they were probably
        smugglers using enchanted disguises.</li><li>Mrs. Cake cryptically
        warns: <em>“Those ghosts were more alive than you think, but you won’t
        find them in the light of
        day.”</em></li></ul></li><li><p><strong>Suspicious
        Visitors:</strong></p><ul><li>Players hear that someone wearing an
        alchemist’s guild badge was seen visiting the temple shortly before the
        theft. This lead points them to the Alchemists'
        Guild.</li></ul></li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p>Brother Frank (exasperated):<br
        /><em>“We have a... minor issue. The river occasionally reverses flow
        now. Nothing too worrying. Except when it starts
        laughing.”</em></p></li><li><p>High Priest Noodin (nervously):<br
        /><em>“You wouldn’t happen to know if any… entities have taken an
        interest in the river recently, would you?”</em></p></li><li><p>Mrs.
        Cake (side encounter):<br /><em>“A near-death experience is on the
        horizon. But you’ll be fine, unless you’re too slow. No refunds for
        delays!”</em></p></li></ul><hr /><h4><strong>How the Scene
        Ends:</strong></h4><p>The party learns that both the Alchemists' and
        Thieves' Guilds have suspicious ties to the event. Evidence of tampered
        water channels and ghostly figures points toward smuggling operations in
        the Drowned Quarter. Mrs. Cake may also give them a prophetic clue
        (<em>“Mind the third dock on the left. It’s… moody.”</em>).</p><p>The
        players can now choose whether to investigate the <strong>Alchemists’
        Guild</strong> or follow up on rumours of smuggling.</p><hr
        /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Divine Confusion:</strong><br
        />The players bungle their questioning, leading to further internal
        chaos among the priests. Rival sects declare conflicting prophecies,
        causing a minor religious riot.</p><ul><li>Future interactions with the
        temple may be met with suspicion or outright
        hostility.</li></ul></li><li><p><strong>Misleading
        Information:</strong><br />The players fail to identify the true leads
        and receive false information about a non-existent divine curse. They
        may waste time investigating unrelated supernatural
        phenomena.</p></li><li><p><strong>Humorous
        Consequence:</strong></p><ul><li>The <strong>Loaf God</strong> incident
        escalates, with priests chasing after enchanted bread rolls that disrupt
        the investigation.</li><li>A priest mistakes one of the players for a
        reincarnation of a forgotten deity and starts an embarrassing public
        worship ritual.</li></ul></li></ol>
