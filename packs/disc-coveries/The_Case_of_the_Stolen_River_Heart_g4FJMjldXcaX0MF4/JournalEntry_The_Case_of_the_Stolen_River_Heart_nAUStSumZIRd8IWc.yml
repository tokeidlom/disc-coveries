name: The Case of the Stolen River Heart
_id: nAUStSumZIRd8IWc
pages:
  - sort: 100000
    name: Overview
    type: text
    _id: 2eT0ellVCfQlbPka
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3><strong>The Hook:</strong></h3><p>The <strong>Heart of the
        Ankh</strong> (an artefact tied to the mysterious ebb and flow of the
        river) has gone missing from the <strong>Temple of the Ankh</strong>.
        With guild rivalries already teetering on the edge of war, <strong>Lord
        Vetinari</strong> quietly assembles a group of "independent specialists"
        to handle the matter discreetly... by which he means without paperwork
        and plausible deniability.</p><hr
        /><h3><strong>Factions</strong></h3><ol><li><p><strong>The Thieves'
        Guild</strong><br />Legal crime at its finest. Senior guild members
        insists their people had nothing to do with the theft—<em>because no
        crime is allowed without proper
        authorisation.</em></p></li><li><p><strong>The Assassins'
        Guild</strong><br />The black clad professionals deny involvement in any
        recent "unfortunate accidents" near the temple, but rumours abound of
        rogue elements seeking a bit of independent
        business.</p></li><li><p><strong>The Alchemists' Guild</strong><br
        />Their labs are constantly "misfiring," and they’re under suspicion for
        magical contraband. Exploding experiments are a normal
        Tuesday.</p></li><li><p><strong>The Ankh-Morpork City Watch</strong><br
        />Led by <strong>Commander Sam Vimes</strong>, the Watch is already
        stretched thin by guild tensions. <strong>Captain Carrot</strong>
        personally meets the group, hoping that their unique talents might
        offer… unconventional solutions.</p></li><li><p><strong>The Beggars'
        Guild</strong><br />The Beggars' Guild, has its ear to the ground and
        knows where <em>everything</em> is happening. For a fee, or a large pie,
        they might part with information.</p></li><li><p><strong>The Temple of
        Small Gods</strong><br />The priests, are convinced that divine wrath is
        imminent. One priest is quietly trying to convince everyone that the
        River Ankh isn’t technically alive enough to have a wrathful
        opinion.</p></li></ol><hr /><h3><strong>Party
        Composition:</strong></h3><ol><li><strong>Sylas Vexmoor
        (Rogue/Thief):</strong> A Thieves' Guild dropout who's dodging a
        "disciplinary payment plan."</li><li><strong>Ilyana Duskwright
        (Engineer):</strong> A disgraced inventor from the Alchemists’ Guild
        whose projects have <em>only</em> caused minor
        explosions.</li><li><strong>Garrik Flintbeard (Mercenary):</strong> A
        retired Klatchian mercenary who just wanted some peace and quiet. Bad
        luck, that.</li><li><strong>Thalia Quickstride (Bard):</strong> A former
        performer at the Mended Drum who learned not to sing anything that
        sounds remotely like a drinking anthem.</li><li><strong>Brother Aldwin
        Greenshade (Diplomat):</strong> A stubborn yet diplomatic clerk from the
        Guild of Lawyers who insists on negotiating everything, even bar
        fights.</li></ol>
