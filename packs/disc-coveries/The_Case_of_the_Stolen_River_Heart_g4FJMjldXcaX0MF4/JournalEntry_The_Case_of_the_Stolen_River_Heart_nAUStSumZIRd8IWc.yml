  - sort: 150000
    name: 'Scene 0: The Setup'
    type: text
    _id: qZHskQU92Og01NBT
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3><strong>The Call to the Patrician’s Office</strong></h3><hr
        /><h4><strong>Sylas Vexmoor
        (Rogue/Thief)</strong></h4><p><strong>Location:</strong> Hiding out in a
        small safehouse in the Shades district.<br /><strong>What
        Happens:</strong><br />One moment, Sylas is enjoying a rare quiet
        moment. The next, two unamused members of the Thieves' Guild appear in
        his doorway.</p><ul><li><em>“The Patrician wants to speak with you. We
        aren’t allowed to say no. So neither are
        you.”</em></li></ul><p><strong>How He Feels:</strong><br />Suspicious.
        He knows Vetinari only deals with people when they’re either
        <em>dangerous</em> or <em>useful</em>. Being both is not
        comforting.</p><hr /><h4><strong>Ilyana Duskwright
        (Engineer/Inventor)</strong></h4><p><strong>Location:</strong> Her
        cluttered workshop, somewhere near the Alchemists’ Guild.<br
        /><strong>What Happens:</strong><br />A city clerk arrives at her
        workshop, holding a formal summons from the Patrician’s office. Ilyana’s
        first reaction is to assume the Guild of Infrastructure finally wants to
        charge her for "unregulated experiments."</p><ul><li>Clerk: <em>“Miss
        Duskwright, you’ve been cordially invited to meet the
        Patrician.”</em></li><li>Ilyana: <em>“Invited?”</em></li><li>Clerk
        (sighing): <em>“An invitation comes with… limited refusal
        options.”</em></li></ul><p><strong>How She Feels:</strong><br />Annoyed.
        This feels suspiciously like being drafted into something
        political.</p><hr /><h4><strong>Garrik 'Grinder' Flintbeard (Dwarven
        Mercenary)</strong></h4><p><strong>Location:</strong> The Broken Barrel
        Tavern, having a peaceful pint after dealing with guild squabbles all
        day.<br /><strong>What Happens:</strong><br />Two City Watch officers,
        including Sergeant Detritus, arrive to escort Garrik to the
        palace.</p><ul><li>Detritus: <em>“Commander Vimes sez yous might be
        'elpful.”</em></li><li>Garrik: <em>“'Helpful'? Sounds like
        trouble.”</em></li><li>Detritus: <em>“Well, duh. It’s
        Ankh-Morpork.”</em></li></ul><p><strong>How He Feels:</strong><br
        />Irritated. He came here to <em>avoid</em> official business, not to
        get dragged into politics.</p><hr /><h4><strong>Thalia Quickstride
        (Bard/Spy)</strong></h4><p><strong>Location:</strong> Performing in a
        small tavern near the Mended Drum.<br /><strong>What
        Happens:</strong><br />A courier from the Beggars’ Guild interrupts her
        performance with an urgent note from the
        guildmaster.</p><ul><li>Courier: <em>“Apparently, Lady Beggar said
        you’ve got an appointment with… him.”</em></li><li>Thalia: <em>“You mean
        Vetinari?”</em></li><li>Courier (shivering): <em>“Don’t say it out loud,
        you want him appearing outta nowhere?”</em></li></ul><p><strong>How She
        Feels:</strong><br />Curious but cautious. Vetinari rarely takes notice
        of performers unless it’s <em>strategic</em>.</p><hr
        /><h4><strong>Brother Aldwin Greenshade
        (Mediator/Strategist)</strong></h4><p><strong>Location:</strong> In the
        middle of mediating a petty dispute between two merchants over <em>who
        owns the rights to a corner fruit stand</em>.<br /><strong>What
        Happens:</strong><br />An elegantly dressed messenger arrives
        mid-argument, bowing politely.</p><ul><li>Messenger: <em>“Brother
        Aldwin, Lord Vetinari requests your presence.
        Immediately.”</em></li><li>Aldwin: <em>“Can this wait? I'm in the middle
        of a dispute.”</em></li><li>Messenger: <em>“Oh, I’m sure his lordship
        would be fascinated by your reasoning for prioritising a fruit stand
        over city-wide stability.”</em></li></ul><p><strong>How He
        Feels:</strong><br />Resigned. He understands Vetinari’s interest means
        something serious—and probably deeply inconvenient.</p><hr
        /><h3><strong>Arrival at the Patrician’s Palace</strong></h3><p>By
        various means (whether escorted or escorted under polite duress), the
        group converges in the Patrician’s office at the same time. They’re
        greeted by <strong>Drumknott</strong>, who motions for silence as
        Vetinari silently observes them for an uncomfortably long
        time.</p><p>Finally, Vetinari speaks.</p><ul><li><em>“Ah, my guests.
        You’re all here for different reasons, of course, but I believe you’ll
        find your individual interests align quite neatly with this… task I have
        for you. Shall we begin?”</em></li></ul><p>The players quickly realise
        they have little choice but to listen and cooperate—for now. Thus, their
        unlikely partnership is sealed under the watchful eye of Lord
        Vetinari.</p>
