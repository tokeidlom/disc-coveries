  - sort: 1400000
    name: 'Side Event 6: Grand Market'
    type: text
    _id: 9c4ibIuMEx41tjCY
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Triggers to
        Visit:</strong></p><ul><li><strong>Rumours:</strong> Players overhear
        that someone in the market knows about a <em>"big heist"</em> related to
        the <strong>Heart of the Ankh</strong>.</li><li><strong>Guild
        Business:</strong> Rival factions may use the market for <strong>covert
        meetings</strong>.</li><li><strong>Personal Motivation:</strong> Nobby
        Nobbs might mention the market as a place to gather <em>"useful"</em>
        supplies— <em>“Trust me, the junk there is genuine
        garbage!”</em></li></ul><hr
        /><h3><strong>Description:</strong></h3><p>The <strong>Grand
        Market</strong> is a chaotic maze of <strong>colourful stalls, shady
        dealers, and impromptu performances</strong>. Merchants aggressively
        peddle everything from <strong>questionable relics</strong> to
        alchemical "remedies" (<em>“Guaranteed to cure absolutely
        everything!”</em>). <strong>Pickpockets and con artists</strong> move
        through the crowds like dancers in a well-rehearsed routine.</p><hr
        /><h3><strong>Elements:</strong></h3><ul><li>A <strong>tattered
        sign</strong> reads: <em>“Complaints? Speak to management. Good luck
        finding them.”</em></li><li>A <strong>con artist</strong> boasts about a
        <em>"legendary map of the vault"</em>, but it’s just a
        <strong>doodle</strong> of a river and some circles.</li><li>A
        <strong>cursed item vendor</strong> has accidentally enchanted <strong>a
        pair of socks</strong>—which keep escaping whenever
        touched.</li></ul><hr /><h3><strong>Key
        NPCs:</strong></h3><ul><li><strong>Alfric Bottlebrush (Conman)</strong>
        – Claims to have <strong>inside information</strong>, but constantly
        <strong>contradicts himself</strong>.</li><li><strong>Madame Florn
        (Cursed Artefact Dealer)</strong> – Overzealous, eager to sell
        <strong>dubious magical trinkets</strong>.</li><li><strong>Street
        Performer Troupes</strong> – One troupe specializes in
        <strong>poorly-rehearsed reenactments</strong> of local
        gossip.</li><li><strong>Beggars' Guild Members</strong> – Observant and
        talkative—if paid or bribed with food.</li></ul><hr /><h3><strong>GM
        Prompts:</strong></h3><ul><li>A merchant waves frantically: <em>“Only
        the finest magical protection charms! Works 30% of the
        time!”</em></li><li>A street performer trips mid-juggle, sending
        <strong>a chicken flying</strong> directly at a player.</li><li>A beggar
        whispers: <em>“I might know a thing or two about missing artefacts...
        for a pie or three.”</em></li></ul><hr /><h3><strong>Potential Clues and
        Leads:</strong></h3><ul><li>Players may learn that <strong>Drowned
        Quarter smugglers</strong> were recently seen <strong>purchasing
        specialized aquatic transport gear</strong> here.</li><li>A
        <strong>paranoid vendor</strong> reveals that <strong>guild
        spies</strong> often use a certain <strong>back alley</strong> near the
        market for secret meetings.</li><li><strong>Alfric Bottlebrush</strong>
        suggests a link between the <strong>missing artefact</strong> and a
        <strong>"mysterious auction"</strong>, though whether this is
        <strong>real or fabricated</strong> is unclear.</li></ul><hr
        /><h3><strong>How the Scene Ends:</strong></h3><ul><li>The players
        acquire <strong>clues, gossip, or supplies</strong> before continuing to
        either the <strong>Temple District</strong> or the <strong>Drowned
        Quarter</strong>.</li><li>Alternatively, a <strong>market-wide
        brawl</strong> might break out due to <strong>guild spies recognizing
        each other</strong>, forcing the players to <strong>flee, fight, or
        exploit the chaos</strong>.</li></ul>
