  - sort: 800000
    name: 'Scene 7: Vault Heist'
    type: text
    _id: nz6ZWvVyqWlPVfOQ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Objective:</strong> Recover the artefact and deal with rival
        factions.</p><h4><strong>Key NPCs:</strong></h4><ul><li><strong>Guild
        Representatives</strong> – Thieves, Assassins, and Alchemists, each with
        their own agendas.</li><li><strong>Rival Heist Crew</strong> – A
        separate group attempting to claim the artefact
        first.</li><li><strong>Lord Vetinari's Messenger</strong> – Arrives at
        an inconvenient moment with an ominous
        message.</li></ul><h4><strong>Location:</strong></h4><p>A hidden vault
        deep beneath the Guild District, designed to keep out everyone—including
        its original builders, who promptly lost the blueprints. The chamber is
        a mix of ostentatious security measures, ancient contraptions, and
        arcane nonsense.</p><h4><strong>Description:</strong></h4><p>The vault
        is a massive underground chamber filled with shifting walls, glowing
        runes, and mechanical traps that seem both needlessly complex and oddly
        whimsical. The artefact sits atop a grand pedestal, radiating a soft,
        pulsing glow. Around it, rival guild members eye each other warily,
        waiting for the first fool to make a move. The chamber hums faintly, as
        if amused by the impending chaos.</p><h4><strong>Elements &amp;
        Atmosphere:</strong></h4><ul><li>A giant <strong>countdown
        hourglass</strong> ticks ominously—but no one knows what it’s counting
        down to.</li><li>An <strong>illusionary treasure hoard</strong>
        distracts the greedier party members.</li><li>The <strong>pressure plate
        puzzle</strong> has been partially solved—but in the <em>wrong</em> way,
        making it even more unpredictable.</li><li>A <strong>thief tries to
        monologue</strong> about their brilliance and immediately steps on a
        trigger.</li></ul><h4><strong>Investigation &amp;
        Clues:</strong></h4><ul><li>The magical traps appear to have been
        <strong>tampered with</strong>—suggesting inside knowledge from someone
        with vault access.</li><li>A half-burnt <strong>ledger</strong> near the
        entrance suggests someone has been tracking artefact
        movements.</li><li>The <strong>artefact is humming</strong> at a
        frequency that resonates with one of the players' personal belongings
        (indicating a connection).</li></ul><h4><strong>GM Prompts &amp; NPC
        Dialogue:</strong></h4><ul><li><strong>Thief Leader:</strong>
        <em>"Right, nobody move! Except me. And my crew. And—oh, blast it, just
        stay out of our way."</em></li><li><strong>Assassin
        Representative:</strong> <em>"This would be much simpler if we just
        eliminated everyone here. Efficient. Elegant. No loose
        ends."</em></li><li><strong>Alchemist:</strong> <em>"Oh, do be careful!
        That artefact is an unprecedented fusion of thaumaturgy and chemistry.
        The wrong touch and—"</em> <em>BOOM</em> <em>"Ah. Well, good to
        know."</em></li><li><strong>Lord Vetinari's Messenger arrives:</strong>
        <em>"His Lordship expected you to retrieve this with discretion. He's
        very disappointed. Well, not very—that would imply emotional investment.
        Mildly disappointed, perhaps."</em></li></ul><h4><strong>Challenges
        &amp; Failures:</strong></h4><ul><li><strong>Botched Puzzle
        Solving:</strong> The wrong pressure plate is pressed, causing an
        overdramatic <strong>trap malfunction</strong> (e.g., raining confetti,
        unleashing angry clockwork pigeons).</li><li><strong>Overzealous Rival
        Crew:</strong> The rival thieves’ team tries to double-cross everyone
        and ends up locking themselves in a secondary trap
        room.</li><li><strong>Guilds Interfering:</strong> The Assassins’ Guild
        declares they <em>own</em> the artefact by right of contractual
        assassination and threatens "legal
        consequences."</li><li><strong>Overuse of Magic:</strong> If magic is
        recklessly applied, the vault’s <strong>arcane defenses</strong> respond
        unpredictably—possibly turning someone’s hair into animated
        snakes.</li></ul><h4><strong>How the Scene
        Ends:</strong></h4><ul><li><p>The party <strong>secures the
        artefact</strong>, but at the cost of either:</p><ul><li><strong>A rival
        faction owing them a favour</strong> (if they handled negotiations
        well).</li><li><strong>A rival faction swearing revenge</strong> (if
        things went poorly).</li><li><strong>City-wide consequences</strong> (if
        they made a public spectacle of it).</li></ul></li><li><strong>Vetinari
        is already aware</strong> of the result, whether or not the party
        informs him. His message makes it clear that the next step is returning
        the artefact <em>without further complications...
        preferably</em>.</li></ul>
