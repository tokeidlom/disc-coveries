  - sort: 1200000
    name: 'Side Event 4: The Riot Tax Collector'
    type: text
    _id: 979b53PGPA6kxJak
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Location:</strong> Near a conflict zone or the street
        riot</p><p><strong>Trigger:</strong> The players notice a strangely calm
        bureaucrat observing the
        chaos.</p><h4><strong>Description:</strong></h4><p>Amidst the chaos of
        rioting guild members and panicked citizens, a lone <strong>tax
        collector from the Guild of Civic Revenue</strong> stands completely
        unfazed, meticulously documenting property damage. He adjusts his
        spectacles, takes careful notes, and then turns to the players with an
        air of quiet authority.</p><p><em>"Would you happen to know who I can
        invoice for these damages?"</em> he asks, pen
        poised.</p><h4><strong>Potential Outcomes:</strong></h4><ul><li>If the
        players <strong>humour him</strong>, he provides <strong>useful
        information</strong> about guild fines, debts, or bureaucratic loopholes
        that may aid their investigation.</li><li>If they <strong>antagonise
        him</strong>, he begins <strong>filing fines against them</strong>,
        citing obscure infractions such as <em>"witnessing unauthorised civil
        disobedience."</em></li><li>If they attempt to <strong>bribe
        him</strong>, he sighs, produces Form 27B/6, and requests it be filed in
        triplicate first.</li></ul><h4><strong>Humour
        Elements:</strong></h4><ul><li><p>He produces an <strong>endless stack
        of forms and invoices</strong>, each increasingly
        absurd:</p><ul><li><em>"Potential Noise Pollution
        Fee"</em></li><li><em>"Incidental Dust Redistribution
        Tax"</em></li><li><em>"Disturbance of Mythic Balance
        Violation"</em></li></ul></li><li>If the players refuse to engage, he
        mutters, <em>“Ah well, default fines it is,”</em> and begins writing
        furiously.</li></ul>
