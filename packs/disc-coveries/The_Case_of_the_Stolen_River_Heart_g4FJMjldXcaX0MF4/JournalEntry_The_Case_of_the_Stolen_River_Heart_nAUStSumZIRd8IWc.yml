  - sort: 200000
    name: 'Scene 1: The Patrician’s Office'
    type: text
    _id: GEoOTJwdN9P97EaX
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Introduce the stakes and factions
        at play. Vetinari "invites" the party to discreetly handle the theft of
        the Heart of the Ankh to prevent guild conflict and maintain the city’s
        delicate balance of power.</p><hr
        /><h4><strong>Location:</strong></h4><p>The Patrician’s Palace – a
        towering, gothic structure that seems to watch you from every angle.
        Inside, the walls are tall and narrow, casting long shadows that make
        everything feel colder and more austere. The office itself is
        meticulously organised: an imposing mahogany desk, towering shelves of
        documents, and a single narrow window letting in cold light. It feels
        like a place where decisions are made without a shred of
        sentiment.</p><hr /><h4><strong>Key
        NPCs:</strong></h4><ol><li><strong>Lord Havelock Vetinari</strong> – The
        calm, enigmatic Patrician of Ankh-Morpork. His words are carefully
        chosen, implying threats, promises, and opportunities all at
        once.</li><li><strong>Drumknott</strong> – Vetinari’s loyal and eerily
        efficient secretary. Silent and unobtrusive, Drumknott appears and
        disappears without a sound, unnerving even seasoned
        criminals.</li></ol><p><strong>Optional
        Addition:</strong></p><ul><li><strong>Captain Carrot
        Ironfoundersson</strong> – Carrot could be present to provide what
        little information the Watch has gathered (which is minimal). His
        sincere optimism offers an amusing contrast to Vetinari's veiled
        menace.</li></ul><hr /><h4><strong>Description:</strong></h4><p>The
        players are escorted through the labyrinthine corridors of the palace by
        silent guards. Upon entering the office, they see Vetinari seated behind
        his desk, his fingers steepled as he observes them in unsettling
        silence. The only sound is the occasional shuffle of papers from
        Drumknott, who appears and disappears as if by magic. Every moment feels
        carefully controlled, like a chess game with unseen pieces.</p><p>When
        Vetinari speaks, his voice is calm but layered with subtle menace. He
        explains the theft of the <strong>Heart of the Ankh</strong>, an
        artefact tied to the city's river and certain religious orders. The
        theft threatens to spark guild rivalries and destabilise the city if not
        handled quietly.</p><hr /><h4><strong>Elements to
        Emphasise:</strong></h4><ul><li><strong>Vetinari’s Control:</strong> He
        speaks in riddles and double meanings, forcing the players to interpret
        his intentions.</li><li><strong>Drumknott's Efficiency:</strong> He
        moves silently, often startling players by appearing behind them with a
        perfectly timed cough or observation.</li><li><strong>Hints of
        Politics:</strong> Vetinari drops subtle references to factional
        tensions, hinting that guilds may already be vying for control of the
        situation.</li></ul><hr /><h4><strong>Something to
        Investigate/Find:</strong></h4><p>The players may notice subtle clues if
        they look closely or succeed on investigation
        checks:</p><ol><li><strong>A Ledger:</strong> A list of recent contracts
        and permits involving the Temple of Small Gods and the Alchemists'
        Guild.</li><li><strong>A Sealed Letter:</strong> Drumknott files away a
        letter marked with an alchemical insignia, suggesting guild
        involvement.</li><li><strong>A Watch Report:</strong> A summary on
        Vetinari’s desk hints at illegal smuggling in the Drowned
        Quarter.</li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p>Vetinari (to the whole party):<br
        /><em>“You will, of course, handle this quietly. I trust that each of
        you values both life and… the absence of severe
        inconvenience?”</em></p></li><li><p>Vetinari (specific to a
        character):</p><ul><li>To <strong>Sylas (Thief):</strong> <em>“I trust
        your current associates in the Thieves' Guild would prefer you remained…
        unincarcerated.”</em></li><li>To <strong>Ilyana (Engineer):</strong>
        <em>“Your workshop operates under certain… exemptions. A pity if those
        arrangements expired.”</em></li></ul></li><li><p>Drumknott
        (interrupting):<br /><em>“By mishaps, my lord means 'collateral
        disasters'—er, apologies, too direct.”</em></p></li><li><p>Vetinari
        (final warning):<br /><em>“You’re, of course, free to decline. However,
        please keep in mind that anyone declining my offers often becomes very…
        freelance in this city.”</em></p></li></ul><hr /><h4><strong>How the
        Scene Ends:</strong></h4><p>Vetinari offers a potential
        lead:</p><ul><li>The <strong>Temple of Small Gods</strong> (<em>“an
        institution of… shifting reliability”</em>).</li></ul><p>The party is
        dismissed with a reminder that their actions will be watched—and
        judged.</p><hr /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Severe
        Misunderstanding:</strong><br />The players offend Vetinari by being too
        pushy or dismissive. Vetinari gives them misleading information to
        punish their lack of discretion, leading to a dead-end
        investigation.</p></li><li><p><strong>Increased Tensions:</strong><br
        />Vetinari leaks word of the party’s involvement to rival guilds,
        causing immediate suspicion. The players might be shadowed by spies or
        ambushed by guild agents in future
        scenes.</p></li><li><p><strong>Humorous Consequence:</strong><br
        />Drumknott quietly files an "Official Notice of Insubordination."
        Though bureaucratic nonsense, the players may face minor but irritating
        repercussions, such as being fined for "unauthorised
        sleuthing."</p></li></ol>
