  - sort: 500000
    name: 'Scene 5: Guild District Headquarters'
    type: text
    _id: pvl5QrUCpLMC3cEZ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Handle escalating tensions
        between the guilds and extract valuable information about the artefact
        while navigating Ankh-Morpork's infamously complex bureaucracy. The
        players may need to play factions against each other or mediate between
        opposing interests to avoid a full-scale conflict.</p><hr
        /><h4><strong>Location:</strong></h4><p>The <strong>Guild District
        Headquarters</strong> – A district dominated by towering, unnecessarily
        elaborate buildings designed to impress and confuse outsiders. Guild
        banners flutter from balconies, and cloaked figures scurry between
        headquarters, whispering and plotting. Guards and assistants from
        various factions watch the party warily as if expecting sabotage at any
        moment.</p><p>Inside the central chamber, guild representatives gather
        around a large circular table, arguing over jurisdictional disputes.
        Some guilds send elaborately robed representatives; others dispatch
        sharp-eyed lawyers who carry stacks of permits and ledgers.</p><hr
        /><h4><strong>Key NPCs:</strong></h4><ol><li><strong>Nimble Jack
        Strapsnatch</strong> – The Thieves’ Guild representative, a smug and
        well-dressed negotiator who prides himself on his guild’s "legitimate
        business operations."</li><li><strong>Mr. Slant</strong> – The undead
        lawyer for multiple guilds, who obsessively quotes legal codes and
        offers ambiguous advice. He is methodical and nearly impossible to
        rattle.</li><li><strong>Guild Scribe Marlin Thistle (optional)</strong>
        – A weary bureaucrat who manages guild documentation. He’s drowning in
        paperwork and takes sadistic pleasure in watching newcomers struggle
        with guild procedures.</li></ol><hr
        /><h4><strong>Description:</strong></h4><p>The guild district feels like
        the beating heart of Ankh-Morpork’s political machinery, but that heart
        is clogged with red tape. Representatives loudly debate trade routes,
        taxes, and <em>"unauthorised artefact appropriation"</em>—a term no one
        can agree on. Lawyers and scribes hurry back and forth, delivering
        endless forms to be stamped, signed, and counter-signed.</p><p>As
        tensions rise, the players must carefully navigate the conversation to
        avoid escalating hostilities. One wrong word could cause an argument
        between factions to spiral into violence.</p><hr /><h4><strong>Side
        Elements:</strong></h4><ul><li><p><strong>Absurd Legal
        Procedures:</strong></p><ul><li>A scribe hands over a <strong>34-page
        permit form</strong>, stating: <em>“Sign here, here, and—oh, yes—on the
        wall too, in triplicate.”</em></li><li>Mr. Slant lectures the players on
        obscure legal codes, including <em>“Clause 87-B: Improper Artefact
        Requisition during Sacred
        Events.”</em></li></ul></li><li><p><strong>Guild
        Rivalries:</strong></p><ul><li>A representative from the <strong>Guild
        of Bakers</strong> accuses the Thieves of stealing "proprietary loaf
        designs."</li><li>Guildmasters compete to outdo each other with
        increasingly ridiculous formal
        titles.</li></ul></li><li><p><strong>Miscommunication:</strong></p><ul><li>A
        Thieves' Guild official mutters: <em>“We’re not crooks! We’re
        professionals. There’s a difference. It’s…
        paperwork.”</em></li></ul></li></ul><hr /><h4><strong>Investigation
        Opportunities:</strong></h4><p>The players can use charm, intimidation,
        or subterfuge to extract key information. However, they must tread
        carefully to avoid offending the wrong
        faction.</p><ol><li><p><strong>Guild
        Interrogations:</strong></p><ul><li>Speaking to <strong>Jack</strong>
        may reveal that rogue elements within the guild are acting
        independently, possibly collaborating with smugglers. He may offer
        assistance in exchange for a favour, such as sabotaging a rival guild’s
        reputation.</li></ul></li><li><p><strong>Legal
        Documents:</strong></p><ul><li>A successful investigation check reveals
        transport permits linked to smuggling operations in the Drowned Quarter.
        Players may notice irregularities pointing to <strong>Master Helix
        Fumble</strong>.</li></ul></li><li><p><strong>Eavesdropping:</strong></p><ul><li>Players
        overhear a heated argument between the Assassins’ and Alchemists’
        Guilds. Both accuse each other of having secret dealings with the
        smugglers.</li></ul></li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p><strong>Scribe Marlin
        Thistle:</strong><br /><em>“Just sign here, here… oh, and you’ll need
        three witnesses for this section. Good luck finding
        them.”</em></p></li><li><p><strong>Nimble Jack Strapsnatch:</strong><br
        /><em>“We run a legitimate business here. What’s more respectable than
        professional theft?”</em></p></li><li><p><strong>Mr. Slant:</strong><br
        /><em>“According to subsection 14-D, unauthorised artefact handling
        incurs a fee of... ah, quite a substantial
        amount.”</em></p></li></ul><hr /><h4><strong>How the Scene
        Ends:</strong></h4><p>As tensions escalate, arguments between guild
        representatives become increasingly aggressive. The situation
        deteriorates into a full-scale riot unless the players intervene.
        Depending on their actions, the party can:</p><ul><li><strong>Calm the
        Crowd:</strong> Successfully defusing the situation earns them goodwill
        and further leads.</li><li><strong>Flee the Scene:</strong> If they
        fail, they must escape as the riot spills out into the streets, leading
        directly into <strong>Scene 6: The Street
        Riot</strong>.</li></ul><p>Additionally, the players may attract the
        attention of <strong>spies</strong> or <strong>rival factions</strong>,
        complicating future encounters.</p><hr /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Guild
        Riots:</strong></p><ul><li>A full-scale riot erupts, forcing the players
        to fight or flee. Guild relations worsen, and the players’ reputation in
        the district is damaged.</li></ul></li><li><p><strong>Bureaucratic
        Sabotage:</strong></p><ul><li>The players are buried under mountains of
        paperwork, delaying their investigation. Guild representatives may stall
        or provide false information in
        retaliation.</li></ul></li><li><p><strong>Humorous
        Consequence:</strong></p><ul><li>A faction mistakenly believes one of
        the players has been "promoted" to a ceremonial guild role (e.g.,
        <strong>"Honorary Guild Auditor"</strong>), saddling them with absurd
        duties.</li></ul></li></ol>
