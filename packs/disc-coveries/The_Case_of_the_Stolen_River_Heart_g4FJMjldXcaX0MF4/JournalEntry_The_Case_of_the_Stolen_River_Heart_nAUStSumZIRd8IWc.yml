  - sort: 850000
    name: Conclusion
    type: text
    _id: tqBUCUxBZpBNpSvP
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h3><strong>The Real Culprit: The Alchemists’ Guild (Specifically a
        Rogue Faction)</strong></h3><p>A small group of rogue alchemists, led by
        <strong>Master Helix Fumble</strong>, orchestrated the theft. They
        believe the Heart of the Ankh is a rare stabilising element capable of
        enhancing explosive experiments. However, the theft wasn’t authorised by
        the full guild leadership, causing internal chaos and blame-shifting
        within the guild.</p><hr /><h3><strong>Clues Pointing to Other
        Factions</strong></h3><p><strong>1. The Thieves' Guild (False
        Lead)</strong></p><ul><li><em>Motive Suggestion:</em> Rivals of the
        Temple claim that the Thieves' Guild arranged the theft, possibly as
        leverage over the guilds controlling the city's major
        artefacts.</li><li><em>Why It's False:</em> The Thieves' Guild denies
        involvement, arguing that unauthorised theft would violate guild
        rules.</li></ul><p><strong>Clue Example:</strong> A minor thief was
        caught near the scene of the theft but claims he was just hired to
        "deliver a package" by someone wearing an alchemist’s insignia.</p><hr
        /><p><strong>2. The Temple of Small Gods (Internal Sabotage
        Rumour)</strong></p><ul><li><em>Motive Suggestion:</em> Priests whisper
        that a splinter group within the temple may have staged the theft to
        discredit the current leadership and prompt divine
        "intervention."</li><li><em>Why It's False:</em> The paranoid priests
        are merely deflecting blame due to political tensions in the temple
        hierarchy.</li></ul><p><strong>Clue Example:</strong> An acolyte
        overheard heated arguments between priests about "escalating divine
        retribution theatrics" days before the theft.</p><hr /><p><strong>3. The
        Drowned Quarter Smugglers (Partial Truth)</strong></p><ul><li><em>Motive
        Suggestion:</em> Smugglers were hired to transport the artefact after
        the theft. They’ve been holding it temporarily, unaware of its true
        nature.</li><li><em>Why It's Partial:</em> The smugglers were unwitting
        accomplices but had no direct role in the theft. However, they have
        knowledge of the artefact's movement and who hired
        them.</li></ul><p><strong>Clue Example:</strong> Malik Scarn, the
        smuggler leader, has records of a transaction with a "Master Fumble" but
        refuses to admit it outright without leverage.</p><hr /><p><strong>4.
        The Assassins' Guild (Red Herring)</strong></p><ul><li><em>Motive
        Suggestion:</em> Some believe the artefact was taken as part of a
        shadowy guild contract or internal power struggle.</li><li><em>Why It's
        False:</em> While the Assassins’ Guild has its fingers in various
        intrigues, they see no tactical advantage in the theft and have no
        record of a contract on the artefact.</li></ul><p><strong>Clue
        Example:</strong> A rival guildmaster spreads the rumour to direct
        suspicion away from their own faction.</p><hr /><h3><strong>Twists and
        Layers of Truth</strong></h3><ul><li><p><strong>Master Helix Fumble’s
        Real Goal:</strong> He wanted to prove his theories on magical
        stabilisation by using the Heart in secret experiments. His plan
        backfired when a prototype device nearly exploded, forcing him to hide
        the artefact.</p></li><li><p><strong>Guild Rivalry
        Complications:</strong> The theft provides other guilds with an
        opportunity to undermine each other, leading to backstabbing, bribery,
        and misdirection throughout the investigation.</p></li></ul><hr
        /><h3><strong>Final Revelation:</strong></h3><p>During the vault scene,
        Helix Fumble's faction attempts to reclaim the artefact, revealing that
        they orchestrated the entire event. Vetinari likely suspected this all
        along and simply needed the players to expose the truth in a way that
        could be... <strong>"managed."</strong></p>
