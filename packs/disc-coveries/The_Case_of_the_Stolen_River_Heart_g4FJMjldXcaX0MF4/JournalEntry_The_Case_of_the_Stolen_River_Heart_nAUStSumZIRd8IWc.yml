  - sort: 450000
    name: 'Scene 4: The Drowned Quarter'
    type: text
    _id: Y7bxKYqeD6JiN8xu
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Confirm that the artefact is
        being hidden or moved and deal with local smugglers. Introduce factional
        tensions involving the Thieves' and Assassins' Guilds, as well as rogue
        alchemists.</p><hr /><h4><strong>Location:</strong></h4><p>The
        <strong>Drowned Quarter</strong> – A decaying, semi-flooded district
        near the Ankh. Dilapidated warehouses and rotting wooden docks line the
        mist-filled canals. Lanterns hang from rusted chains, their flickering
        light casting long, ominous shadows across the water. The quarter is a
        lawless, dangerous place where whispers of supernatural events mix with
        underworld gossip.</p><hr /><h4><strong>Key
        NPCs:</strong></h4><ol><li><strong>Malik Scarn</strong> – A seasoned and
        pragmatic smuggler leader. He’s well-connected but cautious, always
        feigning ignorance when cornered. He will cooperate—if the price is
        right.</li><li><strong>Old Jeb "River Tale" Mulligan</strong> – An
        eccentric old sailor with a reputation for spinning wild stories.
        Despite his ramblings, he often knows more than he lets
        on.</li><li><strong>Assassins' Guild Agent (Optional)</strong> – A
        shadowy figure who may be observing the smugglers. They’re gathering
        intelligence on the artefact for their own guild's
        interests.</li></ol><hr /><h4><strong>Description:</strong></h4><p>As
        the players enter the Drowned Quarter, the atmosphere shifts. The sound
        of water lapping against the docks echoes eerily through the fog.
        Cloaked figures move silently through the mist, and every creak of wood
        feels amplified. Smugglers glance warily at newcomers, and the tension
        is palpable. Nearby, a few gang members laugh at their leader Malik
        Scarn, who is currently climbing out of the canal after an embarrassing
        fall.</p><p>Despite his bluster, Scarn feigns complete ignorance when
        questioned about the artefact. However, subtle tells (nervous glances,
        slip-ups in speech) suggest he knows more than he’s letting on. The
        players must find a way to gain his trust or force him to reveal what he
        knows.</p><hr /><h4><strong>Side
        Elements:</strong></h4><ul><li><p><strong>The River’s Sense of
        Humour:</strong> A thug loudly curses the river after falling in,
        claiming it’s cursed to "target" anyone who doesn’t pay respect to the
        canal gods.</p></li><li><p><strong>Old Jeb’s
        Stories:</strong></p><ul><li><em>“Aye, the river kraken took my hat.
        Still mad about that. But here’s what I heard…”</em></li><li>His
        directions to key locations are surprisingly accurate despite being
        interwoven with fantastical
        details.</li></ul></li><li><p><strong>Mistaken Fear:</strong> A gang
        member panics upon seeing his reflection in the canal and starts
        screaming about a "ghost." His companions roll their
        eyes.</p></li></ul><hr /><h4><strong>Investigation
        Opportunities:</strong></h4><p>The players can interact with various
        characters and search the area for clues about the artefact’s
        movements.</p><ol><li><p><strong>Interrogating Malik
        Scarn:</strong></p><ul><li>Players can use intimidation, persuasion, or
        bribery to get Scarn to talk. He reveals that a "special package" was
        delivered to a warehouse on the far side of the quarter.</li><li>If
        pushed too hard, Scarn may retaliate later by leaking the players'
        activities to rival factions.</li></ul></li><li><p><strong>Exploring the
        Docks:</strong></p><ul><li>Players may find a hidden passage beneath one
        of the rotting warehouses. Inside, crates of alchemical supplies marked
        with the symbol of the Alchemists' Guild suggest a connection to Master
        Helix Fumble.</li></ul></li><li><p><strong>Following the
        Smugglers:</strong></p><ul><li>The players can tail a group of smugglers
        who are moving goods through the canals. This could lead to a
        confrontation or an opportunity to eavesdrop on their
        conversations.</li></ul></li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p><strong>Malik Scarn:</strong><br
        /><em>“Look, I don’t know anything about artefacts. But if I did, I'd be
        charging admission.”</em></p></li><li><p><strong>Old Jeb
        Mulligan:</strong><br /><em>“The third dock’s got a temper. It don’t
        like strangers—especially ones with fancy
        boots.”</em></p></li><li><p><strong>Local Thug:</strong><br /><em>“Avoid
        the shadows out here. They’ve been known to bite.”</em></p></li></ul><hr
        /><h4><strong>How the Scene Ends:</strong></h4><p>The players uncover
        evidence that rogue alchemists hired smugglers to transport the artefact
        after its theft. There are also hints that both the Thieves' and
        Assassins' Guilds have a vested interest in recovering or controlling
        the artefact. Depending on their actions, the players may either gain
        temporary allies or provoke further conflicts with these
        factions.</p><hr /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Smuggler
        Retaliation:</strong></p><ul><li>If the players are too aggressive or
        careless, the smugglers refuse to cooperate and spread false information
        to rival guilds. This causes the players to become targets of both
        criminal and guild enforcers.</li></ul></li><li><p><strong>Wrong
        Clue:</strong></p><ul><li>The players are led to investigate a decoy
        shipment that wastes their time and resources. Meanwhile, the true
        artefact is moved to another hidden
        location.</li></ul></li><li><p><strong>Humorous
        Consequence:</strong></p><ul><li>The players inadvertently trigger a
        minor canal "curse," such as glowing footprints that make stealth
        impossible.</li><li>Old Jeb insists the players now owe him a "hat tax"
        for crossing his favourite canal.</li></ul></li></ol>
