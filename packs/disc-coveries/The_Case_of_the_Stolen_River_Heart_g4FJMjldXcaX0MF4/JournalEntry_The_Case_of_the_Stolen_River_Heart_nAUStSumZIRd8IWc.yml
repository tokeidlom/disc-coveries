  - sort: 1000000
    name: 'Side Event 2: Nobby''s Highly Questionable Black Market Tour'
    type: text
    _id: OurHPnjSJY3IDgTP
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Location:</strong> A shady alley near the Market
        District</p><p><strong>Trigger:</strong> Nobby Nobbs offers to <em>"show
        the players the real treasures of
        Ankh-Morpork."</em></p><h4><strong>Description:</strong></h4><p>Nobby
        takes the players on a <em>"tour"</em> of Ankh-Morpork’s hidden black
        market—a chaotic collection of stalls selling obviously fake relics
        (<em>“The actual Hat of Death!”</em>), expired potions, and questionable
        magical artifacts like the <strong>Unpredictable Teapot of Fate</strong>
        (which changes colour at random). The vendors range from overly
        enthusiastic salesmen to shifty-eyed dealers who look like they might
        disappear at a moment’s notice.</p><h4><strong>Potential
        Outcomes:</strong></h4><ul><li>The players <strong>find a genuinely
        useful item</strong> among the junk, such as a <strong>Guild
        Codebook</strong> or an unassuming trinket that later proves
        valuable.</li><li>Nobby <strong>gets into an argument with
        vendors</strong> over a <em>"misunderstanding"</em> involving stolen
        property.</li><li>A rival thief recognizes Nobby and demands repayment
        for an <em>"old debt,"</em> putting the players in an awkward
        position.</li></ul><h4><strong>Elements:</strong></h4><ul><li>A vendor
        yells, <em>“You break it, you already bought it!”</em></li><li>The
        <strong>Unpredictable Teapot of Fate</strong> explodes into confetti
        when touched.</li><li>One stall sells "genuine" magical wands… which are
        just painted sticks.</li></ul>
