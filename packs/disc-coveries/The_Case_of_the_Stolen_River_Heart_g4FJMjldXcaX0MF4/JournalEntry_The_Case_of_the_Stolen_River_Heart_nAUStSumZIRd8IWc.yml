  - sort: 700000
    name: 'Scene 6: Street Riot'
    type: text
    _id: sj4b0UOuLLLlMSrA
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <h4><strong>Objective:</strong></h4><p>Survive or de-escalate the
        conflict while gaining crucial information about the artefact's final
        location. The players can attempt to mediate between guilds or exploit
        the riot for their own benefit.</p><hr
        /><h4><strong>Location:</strong></h4><p>A <strong>narrow street</strong>
        in the Guild District, with makeshift barricades, overturned carts, and
        banners from multiple guilds. Debris and smoke obscure visibility as
        bottles, bricks, and improvised weapons fly through the air. Various
        factions yell contradictory demands, each blaming the other for the
        chaos. The City Watch struggles to contain the violence, with Captain
        Carrot in the middle of the fray, trying to reason with rioters.</p><hr
        /><h4><strong>Key NPCs:</strong></h4><ol><li><strong>Captain Carrot
        Ironfoundersson</strong> – The ever-optimistic Watch captain who
        genuinely believes in peace and order. Unfortunately, his idealism is
        not particularly effective when surrounded by rioting guild
        members.</li><li><strong>Nobby Nobbs</strong> – A less-than-reliable
        member of the Watch who uses the chaos to scout for "opportunities." He
        offers the party a way out but is clearly looking for personal
        gain.</li><li><strong>Various Guild Members</strong> – Representatives
        from the Thieves, Alchemists, and Assassins’ Guilds, each with their own
        grievances. Some may be willing to talk if approached
        correctly.</li></ol><hr /><h4><strong>Description:</strong></h4><p>The
        street is a chaotic battlefield. Guild members hurl insults and
        improvised weapons at one another while shouting contradictory slogans.
        Overturned market stalls and makeshift barricades create narrow
        pathways. Bystanders and opportunistic looters move through the crowd,
        complicating any attempts at order.</p><p>Carrot is standing on a cart,
        loudly but ineffectively trying to restore peace. Meanwhile, Nobby
        gestures to the players from a nearby alley, suggesting that there are
        better opportunities to be had than getting involved in <em>“all this
        silly bashing.”</em></p><hr /><h4><strong>Side
        Elements:</strong></h4><ul><li><p><strong>Riot
        Arguments:</strong></p><ul><li>Two guild members pause mid-brawl to
        argue about whose boots are shinier.</li><li>A member of the
        <strong>Beggars' Guild</strong> loudly protests that rioters aren't
        paying the "proper disorder tax."</li></ul></li><li><p><strong>Slapstick
        Events:</strong></p><ul><li>A runaway cart rolls down the street, its
        owner chasing it and screaming, <em>“Watch out for me
        goods!”</em></li><li>A stray magical effect causes a rioter's clothes to
        change colours every few seconds, leading to confusion as their faction
        mistakes them for an enemy.</li></ul></li><li><p><strong>Nobby's
        Opportunism:</strong></p><ul><li>Nobby shouts, <em>“Oi! Stop fightin’!
        There’s better loot this way!”</em></li><li>He offers to "escort" the
        players to safety—conveniently near a building known for storing
        valuable guild assets.</li></ul></li></ul><hr
        /><h4><strong>Investigation Opportunities:</strong></h4><p>Amid the
        chaos, the players can uncover clues about the artefact’s
        location.</p><ol><li><p><strong>Interrogating a Guild
        Member:</strong></p><ul><li>A Thieves' Guild enforcer hints that the
        artefact was recently moved to a <strong>vault</strong> in the district.
        However, he refuses to give specifics unless bribed or
        convinced.</li></ul></li><li><p><strong>Following a Rival
        Agent:</strong></p><ul><li>Players notice a suspicious figure (possibly
        an Assassin’s Guild operative) slipping away from the riot. If followed,
        the agent might lead them to a hidden entrance to the vault or a
        smuggling network.</li></ul></li><li><p><strong>Searching Abandoned
        Stalls:</strong></p><ul><li>In the confusion, players may stumble upon
        hastily discarded documents, including notes referencing a <strong>vault
        beneath the district</strong>. The notes bear the seal of a rogue
        alchemist.</li></ul></li></ol><hr /><h4><strong>Key Dialogue
        Prompts:</strong></h4><ul><li><p><strong>Captain Carrot:</strong><br
        /><em>“Now, now, we can all agree stabbing each other isn’t
        necessary.”</em></p></li><li><p><strong>Nobby Nobbs:</strong><br
        /><em>“This street’s full of easy marks—I mean, treasures! Stick with
        me, and we’ll be right as rain.”</em></p></li><li><p><strong>Guild
        Member:</strong><br /><em>“You think this riot’s about artefacts? Ha!
        This is about trade routes, mate. And pride. And ale
        shortages.”</em></p></li></ul><hr /><h4><strong>How the Scene
        Ends:</strong></h4><p>The players secure information confirming that the
        artefact is hidden in a <strong>vault beneath the Guild
        District</strong>. Depending on their actions, they may also secure
        alliances or provoke further animosity between factions. Meanwhile, the
        riot provides cover for a rival faction to make their move on the vault,
        forcing the players to act quickly.</p><p>If the players manage to
        <strong>de-escalate</strong> the conflict, they earn goodwill from the
        City Watch and certain guilds. If they <strong>flee</strong>, they will
        have to face increased hostility from both guild enforcers and Watch
        patrols in future scenes.</p><hr /><h4><strong>Consequences for
        Failure:</strong></h4><ol><li><p><strong>Escalated
        Riot:</strong></p><ul><li>The riot intensifies, spreading to other parts
        of the district. The players become targets for both rioters and the
        City Watch, who blame them for aggravating the
        situation.</li></ul></li><li><p><strong>Misinformation:</strong></p><ul><li>The
        players receive conflicting or false information, leading them to an
        abandoned warehouse or decoy vault. This wastes time and
        resources.</li></ul></li><li><p><strong>Humorous
        Consequence:</strong></p><ul><li>Nobby Nobbs "accidentally" volunteers
        the players to lead peace talks, resulting in them being cornered by
        angry guild representatives.</li><li>A stray magical effect leaves one
        of the players with glowing skin or a voice that echoes comically during
        serious conversations.</li></ul></li></ol>
