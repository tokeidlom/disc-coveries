  - sort: 1300000
    name: 'Side Event 5: A Visit from Moist von Lipwig'
    type: text
    _id: 20jyRBCrWOmdkpCQ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Location:</strong> The players’ current base of
        operations</p><p><strong>Trigger:</strong> Moist von Lipwig arrives
        uninvited, curious about the
        investigation.</p><h4><strong>Description:</strong></h4><p>With his
        usual flair, <em>Moist von Lipwig</em> saunters in as if he owns the
        place, flashing a disarming smile. He insists he's only here to offer
        <em>"friendly advice,"</em> though it’s clear he’s mostly snooping for
        his own amusement—or future profit.</p><p>He casually mentions his
        <em>connections</em>, dropping cryptic hints that he <em>might</em> be
        able to help... for the right price, of course.</p><p><em>"Now, I’m just
        an honest civil servant these days,"</em> he says, palming a coin from a
        player’s pouch, <em>"but I do like to keep my hand in, just in
        case."</em></p><h4><strong>Potential
        Outcomes:</strong></h4><ul><li><strong>Valuable Information:</strong>
        Moist provides <strong>insider knowledge</strong> that helps the players
        bypass a tricky encounter—perhaps a secret entrance or a key
        contact.</li><li><strong>Mysterious Favour:</strong> He offers his help,
        but only <strong>in exchange for an undefined favour</strong>, which
        he’ll call in at an inconvenient time.</li><li><strong>Mild
        Theft:</strong> If not closely watched, Moist attempts to
        <strong>"borrow"</strong> an artefact related to the investigation,
        promising to return it. Eventually. Maybe.</li></ul><h4><strong>Humour
        Elements:</strong></h4><ul><li>Moist absentmindedly <strong>performs
        sleight-of-hand tricks</strong>, occasionally swiping <strong>harmless
        but inconvenient</strong> items (e.g., a player’s quill, belt, or left
        shoe).</li><li>He insists, <em>“Oh, don't worry, I’m reformed. Mostly.
        Well, today, at least.”</em></li><li>If confronted about stealing, he
        gasps theatrically: <em>“Stealing? Me? I’m hurt! This is
        <strong>redistribution with flair!</strong>”</em></li></ul>
