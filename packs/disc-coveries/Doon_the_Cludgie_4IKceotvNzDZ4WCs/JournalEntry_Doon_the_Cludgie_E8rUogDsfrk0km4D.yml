  - sort: 100000
    name: 'Scene 3: The Educated Rodents'
    type: text
    _id: bOzPxBf182XRPPPJ
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Probably still tripping from the octarine spores, the Feegles venture
        further into the sewer, where they’re stopped by a gang of sentient
        rats. These are no ordinary sewer rats; they’ve scavenged bits of
        wizardly refuse and even read scraps of wizardly papers, giving them a
        skewed sense of importance. The rats, brimming with bureaucratic
        pomposity, demand that the Feegles present their “pass” for access to
        this section of the sewer. Tear Along Dotted Line tries to look
        imposing, adjusting his paper sash and waving his “rules” with utmost
        seriousness. They don’t like the intruders on their “manor” and will try
        to extract all sorts of promises from the feegles as well as a share in
        any treasure.</p><p class="MsoNormal" style="text-align:justify">Each
        rat wears bits of discarded wrappers, labelling, and tags they’ve taken
        for names. The rats are highly organized, slightly pompous, and carry
        themselves with an air of bureaucratic authority—having spent years
        scavenging and reading scraps of wizardly refuse and food
        packaging.</p><p><strong>GM Prompt:</strong> As the Feegles enter the
        chamber, the rats step forward in a unified formation, each rat standing
        at attention with a makeshift sash or badge displaying their “names”
        from whatever scraps they wear. The rats demand to know the Feegles'
        business in "their" tunnels, warning them of all sorts of nonsensical
        “regulations” they must follow.</p><p>Key Rat Characters (use as many or
        as few as necessary, from NPC section).</p><p>Example Dialogue and
        Interaction Suggestions:</p><p class="MsoNormal"
        style="text-align:justify">Each rat can contribute something different
        to the encounter:</p><ul style="margin-top:0cm"><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Tear Along Dotted Line might demand to see some kind of
        “pass” for traveling through the tunnels, trying to impress the Feegles
        with his “authority.”</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Warranty Void will happily wax philosophical about the
        dangers of underground travel, using words he picked up from wizard
        papers without truly understanding them.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Batch No. 72 could argue with his fellow rats about what to
        “document,” possibly slowing things down with endless bureaucratic
        chatter.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>If Symptoms Persist and Seek Medical Advice may advise the
        Feegles on dubious health precautions for being covered in
        sludge.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Best Before Date might sniff around any food the Feegles
        carry and try to barter passage in exchange for a snack.</p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p>Ribbed For Her Pleasure may try to
        flatter the Feegles or emulate their warrior bravado, getting the tone
        wrong but providing comic relief.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Keep Away From Fire will react dramatically to any torches or
        magic items they carry, warning them about the “flammable gases” down
        here.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Lemon Scented may be the only rat who genuinely wants to
        help, trying to make a positive impression despite her quirky
        companions.</p></li></ul><p class="MsoNormal"
        style="text-align:justify"><strong>Outcome:</strong></p><p
        class="MsoNormal" style="text-align:justify">The Feegles must figure out
        how to satisfy or outwit the rat gang. They may try to intimidate,
        bribe, or trick their way through, or even humour the rats by pretending
        to follow their “procedures.” Successful interactions with the rats can
        yield valuable information about the tunnels or the ghost that guards
        Tiffany’s pendant, and perhaps even a guide (Lemon Scented or Ribbed For
        Her Pleasure) for the rest of the journey.</p>
