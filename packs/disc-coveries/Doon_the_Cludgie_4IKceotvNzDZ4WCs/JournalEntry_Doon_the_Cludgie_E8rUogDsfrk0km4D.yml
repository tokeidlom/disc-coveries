  - sort: 100000
    name: 'Scene 6: The Sewage Crossing'
    type: text
    _id: jS7JnEGWpl9u7CpP
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span style="font-family:Signika">As the Feegles continue down the
        dank, winding pipes of the University’s sewer system, they come across a
        massive pool of stagnant sewage blocking their path. The pool stretches
        across the tunnel and swirls ominously, emitting a foul odour and
        containing floating debris—broken bits of furniture, rotting wood, and
        various wizardly refuse that may (or may not) be useful. A small raft
        could be constructed to cross the pool safely, though it will require
        some ingenuity.</span></p><p class="MsoNormal"
        style="text-align:justify"><span style="font-family:Signika"><strong>GM
        Prompt:</strong> Describe the thick, brackish sewage, peppered with odd
        magical items and bits of junk. The pool’s surface ripples and shifts,
        hinting at the unknown depths below. Foul-smelling bubbles occasionally
        rise, and the discarded wizardly artifacts appear slightly unstable,
        radiating a faint octarine glow.</span></p><p class="MsoNormal"
        style="text-align:justify"><span
        style="font-family:Signika"><strong>Challenges:</strong></span></p><ul
        style="margin-top:0cm"><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Raft Construction: The
        Feegles must scavenge usable items from the surrounding muck. They can
        gather planks, barrels, or even a broken-down settee, tying it all
        together with strips of fabric, shoelaces, or any detritus lying
        around.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Avoiding “Accidents”: The
        pool occasionally belches up bubbles of noxious gas, requiring players
        to avoid or shield themselves from the smell and potential splash of
        muck. This might require quick thinking and agility tests if the raft
        gets rocked by these unexpected eruptions.</span></p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span style="font-family:Signika">Raft
        Navigation: The pool is full of hazards—floating wizard junk, occasional
        puffs of magical energy, and strange, suctioning eddies. The Feegles
        must paddle across, dodging obstacles and keeping their balance. If they
        lose control, they may end up in the muck, suffering some temporarily
        inconvenient effects (like a “Sewage-soaked”
        trait).</span></p></li></ul><p class="MsoNormal"
        style="text-align:justify"><span
        style="font-family:Signika"><strong>Possible
        Solutions:</strong></span></p><ul style="margin-top:0cm"><li
        class="MsoNormal" style="text-align:justify;mso-list:l1 level1
        lfo2;tab-stops:list 36.0pt"><p><span style="font-family:Signika">Quick
        Raft-Building: Using their innate Feegle resourcefulness, the players
        can construct a serviceable raft by gathering scraps quickly, possibly
        with guidance from any tools or magic they found earlier. Players might
        also use their <em>Daft Pictsie Engineering</em> trait to try to
        stabilize the raft.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l1 level1 lfo2;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Row and Dodge: Rowing the
        raft with pieces of wood or other odd objects, they can carefully steer
        around the obstacles. Players must work together to stay balanced, as a
        few sudden movements could risk sending them all into the
        muck.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l1 level1 lfo2;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Magical Assistance: If any
        of the Feegles picked up magical items earlier in the adventure, they
        might use them here, perhaps creating a gust of wind to help move the
        raft or temporarily ward off the nasty smells.</span></p></li></ul><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika">Upon successfully navigating the pool, the
        Feegles arrive at the final section of the sewer, right below the
        University’s privy where they spot Tiffany’s pendant gleaming just above
        the waterline… but guarded by a ghostly old wizard.</span></p>
