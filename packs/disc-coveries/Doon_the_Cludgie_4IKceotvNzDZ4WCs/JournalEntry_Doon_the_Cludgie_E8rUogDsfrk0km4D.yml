folder: null
name: Doon the Cludgie
_id: E8rUogDsfrk0km4D
pages:
  - sort: 100000
    name: 'Adventure Opening: The Magical Refuse Heap'
    type: text
    _id: EM1RsfPlCRNrGuo3
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Our adventure opens just as the young witch <strong>Tiffany
        Aching</strong> steps away from her meeting with <strong>Eskarina
        Smith</strong>, only to realize, with a jolt of panic, that her prized
        white horse pendant is missing. She had last seen it near the Unseen
        University’s refuse heap—an enormous and chaotic mound of wizardly junk
        and discarded magical experiments. Tiffany suspects that, in a moment of
        inattention, it must have slipped off and tumbled down the privy drain.
        Knowing the dangers that lurk under the university, she knows just who
        to call: the Nac Mac Feegles.</p><p class="MsoNormal"
        style="text-align:justify">The Feegles, true to their nature, take up
        her request with an eagerness for mischief, loot, and a challenge. Even
        as Tiffany pleads with them to handle the pendant gently, they’re
        already scheming ways to snag whatever other “treasures” they might
        encounter. This is no ordinary search, and with the rowdy Feegles on the
        job, it’s bound to be anything but a straightforward recovery
        mission.</p><p class="MsoNormal" style="text-align:justify"><strong>GM
        Prompt:</strong> <span style="font-family:inherit">Tiffany has been
        speaking to Rob Anybody, and he approaches the party looking for a group
        of “volunteers” to search the sewers, as the party are the only ones
        that have so far yet roused from their carousing and drinking last
        night, they’ll have to do! Use this as an opportunity to encourage the
        Feegles to “use their heids, and not just for nuttin’ stuff neither, the
        big wee hag did learn them their numbers and letters an all, and we’d
        not want ti see her a tappin’ o’ the feets, or pursin’ o’ the lips”.
        </span>Describe the chaotic dump, where the Feegles may uncover all
        sorts of magical oddments left behind by careless wizards. They may even
        encounter the talking dog, <strong>Gaspode</strong>, who is exploring
        the heap for scraps of food. He may, or (more likely) may not be helpful
        with directions or unsolicited advice. Strange noises echo from the
        depths of the privy, and the trash heap seems almost alive with strange
        magical items, glistening potion bottles, and perhaps an occasional
        rat.</p><p class="MsoNormal"
        style="text-align:justify"><strong>Encounters:</strong></p><ul
        style="margin-top:0cm"><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><strong>Wizardly Detritus:</strong> Items scattered around
        here include spell-infused scraps, malfunctioning charms, and broken
        wands. A player might be tempted to grab something that looks valuable,
        only to accidentally activate it, triggering amusing consequences (minor
        magical effects, temporary strange appearances, etc.).</p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><strong>Path to the Privy:</strong> After
        some investigation, the Feegles realize they must head into the privy
        and down into the university sewer system, an unplanned but essential
        detour on their adventure.</p></li></ul>
    video:
