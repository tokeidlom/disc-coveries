  - sort: 100000
    name: 'Finale: The Grand Flush'
    type: text
    _id: BA5tKEZbWO0coxVb
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span style="font-family:Signika">After retrieving Tiffany’s pendant
        from the ghostly wizard, the Feegles’ celebration is interrupted by a
        sudden, powerful rumble from above—<em>Archchancellor Ridcully has
        decided it’s time for a bath!</em> As he plunges into the tub, the surge
        of water from above causes a massive flood through the University’s
        pipes – and as the plumbing was designed and installed by Bloody Stupid
        Johnson, this isn’t going to be pretty…</span></p><p class="MsoNormal"
        style="text-align:justify"><span style="font-family:Signika"><strong>GM
        Prompt:</strong> The ground begins to tremble as a rush of water echoes
        from above, sweeping the Feegles and their newly acquired pendant along
        with it. Water from Ridcully’s bath surges through the pipes, turning
        their surroundings into a chaotic torrent of water, sewage, and magical
        debris, carrying them rapidly back the way they came.</span></p><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika"><strong>Escape
        Options:</strong></span></p><ul style="margin-top:0cm"><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span style="font-family:Signika">Ride
        the Wave: The Feegles can attempt to “surf” the flood by grabbing onto
        floating debris and riding the wave out of the tunnels. This requires
        quick reflexes and nimble maneuvering, as they dodge debris and avoid
        getting smacked by objects swirling through the
        current.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Work Together: Feegles
        might form a “Feegle Chain” by holding onto each other and using their
        strength in numbers to avoid getting separated in the rushing
        water.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><span style="font-family:Signika">Brave the Flood: For
        Feegles who embrace the chaotic thrill, they can attempt to navigate the
        flood by simply holding their breath and letting it carry them out,
        albeit with some bumps along the way.</span></p></li></ul>
