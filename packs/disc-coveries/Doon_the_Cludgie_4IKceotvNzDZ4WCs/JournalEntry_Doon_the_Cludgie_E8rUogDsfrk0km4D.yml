    name: 'Scene 4: Glorp the Grand Accumulation – The Fatberg King'
    type: text
    _id: V60bryW7TMsZyP10
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span style="font-family:Signika">Deeper in the sewers, they come
        upon a vast, living sentient fatberg named Glorp, self-styled as the
        “Grand Accumulation.” Glorp is a massive, oozing pile of grease, soap,
        and magical sludge, groaning with self-importance. In a deep, sludgy
        voice, he calls himself the “Keeper of All Things Cast Away” or the
        “Monarch of Muck” and warns the Feegles that they’re trespassing in his
        “kingdom.” It is very displeased to have visitors.</span></p><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika">Glorp presents a formidable challenge: the
        Feegles might try to fight it (though every strike splatters them with
        goop), trick it, or dissolve it using magic items they’ve scavenged.
        Eventually, with much dodging, shouting, and (probably) some slippery
        mishaps, the Feegles manage to either defeat or outwit Glorp, who lets
        out a resounding “GRRRLOOOOP” and collapses, flooding the tunnel with
        thick sludge. The Feegles emerge, now glowing faintly from being
        “Covered in Octarine Goop.”</span></p><p class="MsoNormal"
        style="text-align:justify"><span style="font-family:Signika">The fatberg
        a sense of ominous majesty, befitting its monstrous and sentient nature.
        "Glorp" evokes the goopy, gross aspect of the creature, while "Grand
        Accumulation" hints at its importance and pride in its bloated,
        collected state.</span></p><p class="MsoNormal"
        style="text-align:justify"><span style="font-family:Signika"><strong>GM
        Prompt:</strong> The fatberg’s “body” bubbles and shifts as it blocks
        their path, letting out a deep, resonant groan. The scent is
        overpowering, and it exudes a strong aura of Octarine —players may need
        to find creative ways to justify their actions here.</span></p><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika"><strong>Possible
        Solutions:</strong></span></p><ul style="margin-top:0cm"><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span
        style="font-family:Signika"><strong>Fight It:</strong> The Feegles could
        hack away at the fatberg, though this will splatter them in magical
        sludge.</span></p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><span style="font-family:Signika"><strong>Trick It:</strong>
        The fatberg might be persuaded to shift if they convince it they’re
        merely a figment of its imagination.</span></p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span
        style="font-family:Signika"><strong>Dissolve It with Magic
        Items:</strong> Players may attempt to use anything magical they picked
        up from the dump to dissolve or shrink it.</span></p></li></ul><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika">If the fatberg is disrupted, it sprays
        Octarine sludge, creating a new consequence: the players gain the
        temporary trait <strong>Covered in Octarine Goop</strong>—which will
        make them smell, glow slightly, all of which could complicate future
        encounters.</span></p>
