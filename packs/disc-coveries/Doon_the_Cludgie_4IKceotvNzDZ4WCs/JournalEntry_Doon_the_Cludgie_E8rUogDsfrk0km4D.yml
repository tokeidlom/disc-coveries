  - sort: 100000
    name: 'Scene 2: Round the S-Bend – Hallucinations in the Octarine Mist'
    type: text
    _id: jVzQQaMfprz9CyD6
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>The Feegles inevitably plunge down the privy and eventually emerge
        spluttering into a dimly lit chamber filled with a strange fungus that
        reacts to any movement by emitting puffs of octarine spores. These
        spores cling to the Feegles and cause intense hallucinations.</p><p
        class="MsoNormal" style="text-align:justify">The Feegles must tread
        carefully, moving slowly or holding their breath, but inevitably one of
        them stirs up the spores. Soon, they’re stumbling through the chamber,
        disoriented, seeing mythical monsters, endless treasures, or even each
        other as odd creatures. They eventually stumble out of the chamber,
        laughing and shouting at their hallucinations, finally able to shake off
        the strange visions.</p><p class="MsoNormal"
        style="text-align:justify">Every step disturbs clouds of octarine
        spores, which cling to their skin, producing vivid hallucinations. Rhona
        the Rhymer sees herself surrounded by adoring fans, each one chanting
        her name, while Big Jessie suddenly believes he’s grown to the size of a
        giant and demands the others refer to her as “Yer Majesty.” Old Shuggy
        Two Thumbs, meanwhile, is convinced he’s seen a “Grand Invention” and
        tries to build an imaginary contraption out of thin air.</p><p
        class="MsoNormal" style="text-align:justify"><strong>GM Prompt:</strong>
        The air is thick with an odd, pulsing glow. Every step seems to stir up
        clouds of luminescent spores, creating vivid, shifting images and
        strange sounds. Any Feegle nearby is likely to see things that aren’t
        there or mistake the room for something far more sinister (or humorous)
        than it really is.</p><p class="MsoNormal"
        style="text-align:justify"><strong>Possible Solutions:</strong></p><ul
        style="margin-top:0cm"><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><strong>Move Slowly:</strong> If the Feegles tread lightly
        and carefully, they can avoid triggering the fungal puffs.</p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><strong>Hold Their Breath:</strong>
        Players can try to cross the room in one big breath, though this will
        require a group test.</p></li><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p><strong>Use Traits to Hallucinate Productivity and
        Progress:</strong> The Feegles might try to focus on a hallucination to
        avoid panic, or creatively exploit the illusion to bypass obstacles. The
        hallucinations should last long enough for them to be a hindrance to
        progress, and they stop being funny.</p></li></ul>
