  - sort: 100000
    name: 'Conclusion: Return to the Surface, Dumped Back at the Start'
    type: text
    _id: Fnw0QsMxWxpfNkZL
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>The Feegles are eventually spat out from a large sewer drain near the
        refuse dump where they began, soaked but triumphant, still clutching
        Tiffany’s pendant. Tiffany greets them, thanking them for braving such
        peril to recover her pendant and listening with a mix of amusement and
        horror as they recount their escapades. She promises a small gift or
        perhaps a “blessing” on their future adventures, hinting that she will
        call upon them again for help in the future.</p><p class="MsoNormal"
        style="text-align:justify"><strong>Epilogue:</strong></p><ul
        style="margin-top:0cm"><li class="MsoNormal"
        style="text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list
        36.0pt"><p>Temporary Traits: Each Feegle may gain a new temporary trait
        from their journey, such as “Covered in Octarine Goop,” “Privy Raider,”
        or “Magical Hangover” from inhaling too many wizardly
        fumes.</p></li><li><p>Tiffany’s Gift: Tiffany might present the Feegles
        with a small token or magical charm as a thank-you for their bravery and
        service.</p></li></ul>
