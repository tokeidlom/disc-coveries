    name: 'Scene 5: Coprolite, The Blind Troll'
    type: text
    _id: jceRU1Xx4hM8Au1R
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span style="font-family:Signika">At this point, the players are deep
        in the sewers and find a giant blind troll with his head sticking out of
        a nearby wall. The troll has gotten stuck in the tunnels, and his head
        blocks a critical passageway.</span></p><p class="MsoNormal"
        style="text-align:justify"><span style="font-family:Signika">The troll,
        Coprolite, is wedged into the tunnel wall with his head blocking the
        passage. Blind and slightly grumpy – he’s been here a while and is
        hungry, Coprolite sniffs the air, muttering about the “odd smell of tiny
        warriors.” The Feegles, now glowing and reeking of magical sewage,
        realize they need to either sneak past him or soothe his worries to move
        forward.</span></p><p class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika"><strong>GM Prompt:</strong> Describe the
        huge, scaly head of the troll as it sniffs around blindly, occasionally
        mumbling to itself. Its blindness means it can’t see the Feegles, but it
        can certainly smell them—especially if they still have the
        <strong>Covered in Octarine Goop</strong> trait!</span></p><p
        class="MsoNormal" style="text-align:justify"><span
        style="font-family:Signika"><strong>Possible
        Solutions:</strong></span></p><ul style="margin-top:0cm"><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span
        style="font-family:Signika"><strong>Sneak Past Quietly:</strong> This
        will require a stealth test, made harder if the players still have the
        trait <strong>Covered in Octarine Goop</strong>.</span></p></li><li
        class="MsoNormal" style="text-align:justify;mso-list:l0 level1
        lfo1;tab-stops:list 36.0pt"><p><span
        style="font-family:Signika"><strong>Soothe the Troll:</strong> The
        Feegles might try to talk soothingly to the troll, keeping it calm and
        distracted as they pass.</span></p></li></ul><p><span
        style="font-family:Signika"><strong>Help the Troll Unstick
        Itself:</strong> The troll may agree to help them find Tiffany’s pendant
        if they can figure out a way to help him get unstuck. This will involve
        creative problem-solving and a group test.</span></p>
