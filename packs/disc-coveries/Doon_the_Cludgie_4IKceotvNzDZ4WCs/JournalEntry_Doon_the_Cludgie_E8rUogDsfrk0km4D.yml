    name: 'Scene 7: The Privy Treasure'
    type: text
    _id: vap4JzLaonOchtnK
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: "<p>Finally, the Feegles find themselves at the bottom of the pipe system, right below the University’s privy. The chamber is a mix of sludge, water, and more magical debris. Near the surface, gleaming slightly amid the muck, is Tiffany’s pendant—but it’s guarded by <a>Jorg Winkl. It had been used back in its day to interview prospective students, but as it has extreme prejudices to the point of never admitting any students at all*.</a></p><p class=\"MsoNormal\" style=\"text-align:justify\"><a><strong>GM Prompt:</strong> The hat rises ominously, muttering about its lost library privileges and demanding they leave “it’s” pendant alone. It may initially mistake the Feegles for student wizards playing a prank or may decide it needs to interview them as potential new students, adding to the potential for comedic interaction.</a></p><p class=\"MsoNormal\" style=\"text-align:justify\"><a><strong>Possible Solutions:</strong></a></p><ul style=\"margin-top:0cm\"><li class=\"MsoNormal\" style=\"text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt\"><p><a><strong>Convince the Hat:</strong> The Feegles can try to persuade the hat that Tiffany needs the pendant more than it does, playing to its sense of academic honour.</a></p></li><li class=\"MsoNormal\" style=\"text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt\"><p><a><strong>Intimidate the Hat:</strong> If the Feegles are brave enough to challenge it, they may just scare it off.</a></p></li><li class=\"MsoNormal\" style=\"text-align:justify;mso-list:l0 level1 lfo1;tab-stops:list 36.0pt\"><p><a><strong>Trick the Hat:</strong> The Feegles might try to distract the hat and grab the pendant when it’s not looking.</a></p></li></ul><p class=\"MsoNormal\" style=\"text-align:justify\"><a>Once they retrieve the pendant, the Feegles can retrace their steps (or, more likely, be swept along a flood of sewer water) back to Tiffany, who will be incredibly grateful and reward them with a heartfelt thanks, along with possibly a small magical token for their courage.</a></p><p class=\"MsoNormal\" style=\"text-align:justify\"><a><em>\_</em></a></p><p><a><em>*For quite some time this suited the then Arch Chancellor,<strong> Alberto Malich</strong> finding that students were generally irritating and having to teach them was a distraction for the entire faculty from their incredibly long lunches, dinners and subsequent naps. However, funding being what it was in magical Accademia even then, it eventually resulted in the University being forced into near bankruptcy due to loss of student fees. He then flushed the hat down the privy to conveniently dispose of it in a fit of rage.</em></a></p>"
