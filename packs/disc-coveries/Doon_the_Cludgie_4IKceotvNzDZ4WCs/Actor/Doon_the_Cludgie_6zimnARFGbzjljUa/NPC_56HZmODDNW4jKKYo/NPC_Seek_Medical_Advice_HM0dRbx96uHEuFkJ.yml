  notes: >-
    Partnered with If Symptoms Persist, Seek Medical Advice is a rat of few
    words but the “senior” medic, carrying herself with a stoic, world-weary
    attitude. She often tries to restrain If Symptoms Persist’s enthusiasm,
    muttering warnings like, “That mushroom in’t safe” or “Keep yer distance if
    ya know what’s good for ye.”

    Seek Medical Advice has spent time observing Dr Lawn at the Lady Sybil Free
    Hospital, whereas Seek Medical Advice is more likely to have been hanging
    around Doughnut Jimmy’s, the horse doctor.
