system:
  pronouns: He / Him
  luck: 4
  organisation: Feegle Clan of the Chalk
  background: >-
    Pictsie (Feegle)

    Known throughout the clan as “the one ye can miss,” being the skinniest
    Feegle around. Awf'lly Big Jessie is broad-shouldered and, by Feegle
    standards, towering. His reddish hair is tied back in a braid, and her wide
    smile is always genuine. Jessie’s often seen with his Feegle kin riding on
    his shoulders or holding small animals he’s found in the muck, chatting to
    them gently. Though he prefers talking things out, he’s never afraid to
    throw her weight around (literally) when the need arises.
