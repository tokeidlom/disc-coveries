system:
  pronouns: He / Him
  luck: 4
  organisation: Feegle Clan of the Chalk
  background: >-
    Pictsie (Feegle)

    The clan’s “tinkerer” and proud “inventor,” who’s particularly fond of any
    kind of discarded junk, “fascinatin’ bits o’ metal,” and wizardly scraps.
    Old Shuggy is wiry and a bit hunched, with a pair of oversized thumbs that
    give him his nickname. He’s always carrying a satchel bulging with bits and
    bobs and has the intense, gleeful expression of someone about to tinker with
    the unknown. His beard is often tangled with stray bits of metal or shreds
    of fabric from his latest “creation,” and he wears a pair of small, homemade
    goggles, which he adjusts dramatically before any “engineering feat.”
