  - folder: AfgtyubMZbVALb3A
    name: Optional Additional Abilities and Flavour for Rhona
    type: core
    _id: AMXz4miOvqDofICv
    img: systems/discworld/assets/items/core.webp
    system:
      description: "Rhyming Battle Cries: Rhona can attempt to rally her clanmates or intimidate enemies by shouting original (often silly) rhymes. Some examples:\n•\tFor a battle cry: “A Feegle stands tae do or die, ye flea-bit beast, prepare tae fly!”\n•\tTo inspire her friends: “We’ll crawl through muck, we’ll trudge through grime, wi’ grit and strength, we’ll pass the time!”\nMixed-Blessing Curses: Though still honing her Gonnagle skills, Rhona’s rhymes sometimes produce unintended effects, particularly if her wording gets a bit off. For instance:\n•\tIntended Curse: “May yer eyes be bleary, yer mind confused, yer strength be lost and yer courage abused!”\n•\tUnintended Outcome: The curse works… but everyone in the room, including the Feegles, finds themselves temporarily mixing up words and feeling a bit dizzy.\nInspiring Tunes (Sort of): Her small harp can produce vaguely tuneful sounds if she’s careful. When she plays, her friends might get a minor boost to morale—assuming they can stand the sound long enough. However, any nearby enemies with sensitive hearing (like trolls) might find the off-key plucking more annoying than intimidating.\nEpic Feegle Epitaphs: Rhona is collecting the “great lines of the Feegles” in her rhyme book, hoping to one day write her own to live on in Feegle legend. She’s been practicing lines like:\n•\t“When ye face Rhona, prepare tae cower, or end up pruned like a wilted flower!”\n•\t“Rhona the Rhymer will see ye down, ‘tis wise tae flee when I come tae town!”\nRhona’s a bold, eager character whose ambition sometimes outruns her skill, leading to both hilarious and surprisingly effective moments. She’s a perfect fit for the clan as they navigate the sewers, offering bursts of inspiration, questionable curses, and a poetic commentary to their misadventures.\n"
