system:
  pronouns: She / Her
  luck: 4
  organisation: Feegle Clan of the Chalk
  background: >-
    Pictsie (Feegle)

    Aspiring to be the first female Gonnagle and has no interest in ever being a
    Clan leader. trained under the great poets and curse-slingers of the clan.
    Rhona is small even for a Feegle, with fiery red hair that she keeps pulled
    back in an attempt to look “bardic.” She’s often found furiously scribbling
    in her rhyme book, muttering new insults or verses to herself. Though her
    voice is surprisingly loud, she hasn’t quite mastered its range, often
    screeching notes that set teeth on edge. Her determination to prove herself
    as a Gonnagle makes her intensely focused, and she tends to over-dramatize
    even the smallest situations.
